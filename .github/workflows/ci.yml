name: CI

on:
  push:
    branches: [main, staging, "feature/**"]
  pull_request:
    branches: [main, staging]

jobs:
  # =============================================================================
  # Code Quality Checks
  # =============================================================================

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install black pylint

      - name: Check formatting with black
        run: |
          source .venv/bin/activate
          black --line-length 79 --exclude '(env|venv|.eggs|.git|node_modules)' --check .

      - name: Run pylint
        run: |
          source .venv/bin/activate
          pylint --fail-on=E,F --exit-zero kubetee/ template/ neurons/

  # =============================================================================
  # Python Tests
  # =============================================================================

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          uv pip install pytest pytest-asyncio pytest-cov

      - name: Run acceptance tests
        run: |
          source .venv/bin/activate
          pytest tests/acceptance/test_api_validation.py -v --tb=short

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short --ignore=tests/acceptance/

  # =============================================================================
  # Smart Contract Tests
  # =============================================================================

  test-contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubetee/contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kubetee/contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test

      - name: Run gas estimation
        run: npx hardhat run scripts/estimate-gas.js

  # =============================================================================
  # Build Check
  # =============================================================================

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test-python, test-contracts]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build package
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install build
          python -m build

      - name: Check package
        run: |
          source .venv/bin/activate
          uv pip install twine
          twine check dist/*

  # =============================================================================
  # Docker Build Check
  # =============================================================================

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-python, test-contracts]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base
          push: false
          tags: kubetee-subnet-base:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build final image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: kubetee-subnet:test
          build-args: |
            BASE_IMAGE=kubetee-subnet-base:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
