name: Test

on:
  push:
    branches: [main, feat/*, research/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (provides Python 3.13)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt ruff pytest

      - name: Lint with ruff
        run: uv run --no-project ruff check .

      - name: Test with pytest
        run: uv run --no-project pytest -q --tb=short
