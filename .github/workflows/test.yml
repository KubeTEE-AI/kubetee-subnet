name: Test & Coverage

on:
  push:
    branches: [main, develop, feature/oscm]
  pull_request:
    branches: [main, develop, feature/oscm]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov coverage[toml]
      
      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/acceptance/test_contract_integration.py \
            --cov=kubetee \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results
          path: |
            test-results.xml
            coverage.xml
            coverage_html/
          retention-days: 30
      
      - name: Test Report Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Python Test Results
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

  contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: kubetee/contracts/package-lock.json
      
      - name: Install Hardhat dependencies
        working-directory: kubetee/contracts
        run: npm ci
      
      - name: Compile contracts
        working-directory: kubetee/contracts
        run: npx hardhat compile
      
      - name: Run contract tests
        working-directory: kubetee/contracts
        run: npx hardhat test
      
      - name: Generate contract coverage
        working-directory: kubetee/contracts
        run: npx hardhat coverage || true
        continue-on-error: true
      
      - name: Upload contract coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-coverage
          path: kubetee/contracts/coverage/
          retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [python-tests, contract-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: kubetee/contracts/package-lock.json
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Install Hardhat dependencies
        working-directory: kubetee/contracts
        run: npm ci
      
      - name: Run contract integration tests
        run: |
          python -m pytest tests/acceptance/test_contract_integration.py \
            --junitxml=integration-test-results.xml \
            -v || true
      
      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-test-results.xml
          retention-days: 30

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [python-tests]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Python coverage
        uses: actions/download-artifact@v4
        with:
          name: python-test-results
          path: coverage-results/
      
      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage-results/coverage.xml
          badge: true
          format: markdown
          output: both
          thresholds: '50 80'
      
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  all-tests:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [python-tests, contract-tests, integration-tests]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.python-tests.result }}" == "failure" ]; then
            echo "Python tests failed!"
            exit 1
          fi
          if [ "${{ needs.contract-tests.result }}" == "failure" ]; then
            echo "Contract tests failed!"
            exit 1
          fi
          echo "All tests passed!"
