name: Test

on:
  push:
    branches: [main, feat/*, research/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Lint with ruff
        run: uv run --python 3.13 --with ruff ruff check .

      - name: Lint shell scripts (shellcheck)
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -eq 0 ]; then echo "no shell scripts"; exit 0; fi
          printf 'shellcheck: %s\n' "${files[*]}"
          docker run --rm -v "$PWD:/mnt:ro" -w /mnt koalaman/shellcheck:stable \
            -S warning "${files[@]}"

      - name: Secret scan (committed tokens / private keys)
        run: |
          # Fail if a real Rancher token (name:secret) or a private-key block is
          # committed. Docs are excluded (prose may reference token formats); the
          # intentional disposable dev bootstrap password does not match.
          if git grep -nIE \
               'token-[a-z0-9]{15,}:[a-z0-9]{15,}|-----BEGIN [A-Z ]*PRIVATE KEY-----' \
               -- . ':!*.md'; then
            echo "::error::Potential committed secret (token or private key)"
            exit 1
          fi
          echo "secret scan clean"

      - name: Test with pytest
        run: uv run --python 3.13 --with-requirements requirements.txt --with pytest pytest -q --tb=short
