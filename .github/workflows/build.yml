name: Build

on:
  push:
    branches: [main, feat/*, research/*]
    paths:
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build validator image
        run: docker build -f Dockerfile.validator -t kubetee-validator:test .

      - name: Build docker compose services (dry)
        run: docker compose build validator
