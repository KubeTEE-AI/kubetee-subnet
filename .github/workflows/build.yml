name: Build

on:
  push:
    branches: [main, feat/*, research/*]
    paths:
      - 'Dockerfile*'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Image tag: staging or production (production also tags :latest)'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build validator image
        run: docker build -f Dockerfile -t kubetee-validator:test .

      - name: Import smoke test
        run: |
          # validator.py and its neighbors use bare script-relative imports
          # (e.g. `from miner_scoring import ...`), which only resolve when
          # scripts/ itself is on sys.path -- `cd scripts` matches how the
          # container's own command actually invokes them (`python scripts/validator.py`),
          # NOT `import scripts.validator` from /app (scripts/ has no
          # __init__.py, and the internal imports are not package-qualified).
          docker run --rm --workdir /app/scripts --entrypoint python kubetee-validator:test \
            -c "import validator; import miner_scoring; import rancher_client; print('import smoke OK')"

      - name: Entrypoint smoke test
        run: |
          docker run --rm --workdir /app/scripts --entrypoint python kubetee-validator:test \
            -c "import setup_single_node; print('entrypoint smoke OK')"

  dispatch-integration-test:
    name: Dispatch full-system test to kubetee
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux, X64]
    steps:
      - name: Fire repository_dispatch to kubetee
        env:
          GH_TOKEN: ${{ secrets.KUBETEE_DISPATCH_TOKEN }}
        run: |
          http_code=$(curl -s -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/KubeTEE-AI/kubetee/dispatches" \
            -d "{\"event_type\":\"subnet-pushed\",\"client_payload\":{\"sha\":\"${{ github.sha }}\"}}")
          echo "HTTP status: $http_code"
          echo "Response body:"
          cat /tmp/dispatch_response.json
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::dispatch failed with HTTP $http_code"
            exit 1
          fi

  publish:
    name: Publish image
    if: github.event_name == 'workflow_dispatch'
    needs: docker-build
    runs-on: [self-hosted, linux, X64]
    steps:
      - name: Require release branch
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" != release/* ]]; then
            echo "::error::publish requires a release/* branch, got $REF_NAME"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Resolve version from CHANGELOG.md
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^## \[[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1 | sed -E 's/.*\[([0-9]+\.[0-9]+\.[0-9]+[^]]*)\].*/\1/')
          [ -n "$VERSION" ] || { echo "::error::no version header found in CHANGELOG.md"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set tags
        id: tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ inputs.release_type }}" = "production" ]; then
            echo "tags=-t ${IMAGE}:latest -t ${IMAGE}:v${VERSION} -t ${IMAGE}:$(date +%Y-%m-%d-%H%M)" >> "$GITHUB_OUTPUT"
          else
            echo "tags=-t ${IMAGE}:staging -t ${IMAGE}:v${VERSION}-staging" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: docker buildx build -f Dockerfile --push ${{ steps.tags.outputs.tags }} .

      - name: Pull and import-smoke the published production image
        if: inputs.release_type == 'production'
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker logout ghcr.io
          docker image rm "${IMAGE}:latest" || true
          docker pull "${IMAGE}:latest"
          docker run --rm --workdir /app/scripts --entrypoint python "${IMAGE}:latest" -c \
            "import validator; import miner_scoring; import rancher_client; print(\"remote import smoke OK\")"
