name: Build

on:
  push:
    branches: [main, feat/*, research/*]
    paths:
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build validator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.validator
          push: false
          tags: kubetee-validator:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build docker compose services (dry)
        run: docker compose build --no-cache validator
