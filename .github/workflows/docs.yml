name: Docs

# Lint-only caller for the KubeTEE docs subsystem (kubetee-ci docs-lint.yml).
# This repo is public-bound: generated architecture docs (C4, ARCHITECTURE.md)
# are produced by the private kubetee root's "Docs Subnet" workflow and live
# there, never committed back here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docs:
    uses: KubeTEE-AI/kubetee-ci/.github/workflows/docs-lint.yml@main
