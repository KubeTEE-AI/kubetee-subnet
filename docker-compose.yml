# KubeTEE Subnet Local Testing Stack
# - Local Subtensor chain (fast blocks for dev)
# - Single "validator" container that does EVERYTHING (as requested):
#     * btcli setup (register subnet if needed + stake + start emissions + set conviction/recycle hypers)
#     * background while loop for keeping conviction hypers
#     * background btcli loop printing stats (hypers, stake, metagraph, conviction, etc.)
#     * foreground owner_validator (sets weights 1.0 to owner UID for emission recycle)
# - Dozzle for live log viewing
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f validator
#   open http://localhost:8080 for dozzle
#
# Everything is inside the single validator container command.
# See keys/README.md for the deterministic (pinned) dev accounts.
#
# For testing pyramid:
#   - Use --profile with-miners for additional mock miners
#   - Localnet provides single-node testnet equivalent
#
# Localnet image choice:
#   Default uses the working opentensor localnet image (RaoFoundation localnet dev images
#   currently return 403/not found on GHCR for the devnet tag).
#   You can override with env var to test Rao path if/when it becomes available:
#     LOCALNET_IMAGE=ghcr.io/raofoundation/subtensor-localnet:devnet docker compose up -d chain
#   Or pin a digest:
#     LOCALNET_IMAGE=ghcr.io/opentensor/subtensor-localnet@sha256:...
#   See SUBNET.md for details.

services:
  chain:
    image: ${LOCALNET_IMAGE:-ghcr.io/opentensor/subtensor-localnet:latest}
    container_name: kubetee-chain
    ports:
      - "9944:9944"
    environment:
      - FAST_BLOCKS=true  # 0.25s blocks for fast testing; set false for realistic tempo
    # Localnet health is best checked by the setup script or btcli.
    # We use a simple depends + sleep in validator if needed.
    restart: unless-stopped

  validator:
    build:
      context: .
      dockerfile: Dockerfile.validator
    container_name: kubetee-validator
    depends_on:
      chain:
        condition: service_started
    environment:
      - BT_NETWORK=ws://chain:9944
      - BT_WALLET=owner
      - BT_WALLET_HOTKEY=default
      - KUBETEE_SUBNET_NETUID=1
      - OWNER_HOTKEY=5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY
      - TARGET_UID=0
      - LOG_LEVEL=INFO
    volumes:
      - ~/.bittensor:/root/.bittensor  # wallets (setup + validator will create/use "owner" here)
      - ./logs:/app/logs
    restart: unless-stopped
    # Everything in ONE container command as requested:
    # 1. Run btcli setup (register if needed, stake, start emissions, set conviction/recycle hypers)
    # 2. Background while-loop to keep setting conviction hypers
    # 3. Background btcli stats printer (hypers, stake, metagraph, conviction, etc.)
    # 4. Foreground: owner_validator.py that sets weights 1.0 to owner UID for recycle
    # All logs go to this container (view with `docker compose logs -f validator`)
    command:
      - sh
      - -c
      - |
        set -e
        NETUID=$${KUBETEE_SUBNET_NETUID:-1}
        WALLET=$${BT_WALLET:-owner}
        HOTKEY=$${BT_WALLET_HOTKEY:-default}
        NET=$${BT_NETWORK:-ws://chain:9944}

        echo "=== [validator] Phase 1: btcli setup (register, stake, start, hypers) ==="
        python scripts/setup_single_node.py \
          --netuid "$$NETUID" \
          --owner-wallet "$$WALLET" \
          --chain-endpoint "$$NET" || true

        # Read actual netuid written by setup (in case create allocated e.g. 2)
        if [ -f /app/.kubetee_netuid ]; then
          NETUID=$$(cat /app/.kubetee_netuid)
          echo "Using actual netuid=$$NETUID from setup"
        fi

        echo "=== [validator] Phase 2: starting background loops + owner validator ==="

        # Conviction setter loop (was separate container) - quiet to not pollute stats.
        # setup_single_node.py writes /app/.kubetee_owned=false when it verified (via a
        # real chain query, not a guess) that our wallet does NOT own $$NETUID - e.g. the
        # SubtokenDisabled / pre-owned-bootstrap-netuid case. Retrying a sudo call we
        # already know fails with "wallet doesn't own the specified subnet" every 45s
        # forever was the direct cause of the chain node's HTTP 429 connection throttling.
        # Back off hard (5 min) instead of hammering the chain when we know it's futile,
        # but keep checking in case ownership later changes out-of-band.
        (
          while true; do
            OWNED="unknown"
            [ -f /app/.kubetee_owned ] && OWNED=$$(cat /app/.kubetee_owned)
            if [ "$$OWNED" = "false" ]; then
              echo "[conviction @ $$(date)] skipping - setup verified we do not own netuid $$NETUID (see setup log). Re-checking in 300s."
              sleep 300
              continue
            fi
            echo "[conviction @ $$(date)] setting owner_cut_auto_lock_enabled + recycle..."
            btcli sudo set \
              --netuid "$$NETUID" \
              --param owner_cut_auto_lock_enabled \
              --value true \
              --wallet.name "$$WALLET" \
              --wallet-hotkey "$$HOTKEY" \
              --network "$$NET" \
              --yes > /dev/null 2>&1 || echo "  (set failed - not owner)"
            btcli sudo set \
              --netuid "$$NETUID" \
              --param recycle_or_burn \
              --value Recycle \
              --wallet.name "$$WALLET" \
              --wallet-hotkey "$$HOTKEY" \
              --network "$$NET" \
              --yes > /dev/null 2>&1 || echo "  (set failed - not owner)"
            sleep 45
          done
        ) &

        # Stats printer - loops internally (--loop/--interval) reusing ONE chain
        # connection for the container's lifetime, instead of the old shell
        # while-loop that spawned a fresh python process (and fresh websocket
        # connection) every 25s - that reconnect churn contributed to HTTP 429s.
        python -u scripts/print_subnet_stats.py \
          --netuid "$$NETUID" \
          --network "$$NET" \
          --owner-wallet "$$WALLET" \
          --miner-wallet miner \
          --loop --interval 25 2>&1 | cat &

        # Foreground: the actual owner validator (sets weights 1.0 for recycle)
        echo "Starting owner_validator.py (weights loop)..."
        exec python -u scripts/owner_validator.py

  # Optional: simple mock miner containers for testing comms/scoring (extend as needed)
  miner-1:
    build:
      context: .
      dockerfile: Dockerfile.validator  # reuse or make miner image; for now stub
    container_name: kubetee-miner-1
    profiles: ["with-miners"]
    environment:
      - BT_NETWORK=ws://chain:9944
      - ROLE=miner
    depends_on:
      - chain
    # Explicit command so the validator entrypoint (btcli setup + validator) is not run for the miner stub
    command: ["python", "-c", "import time; print('miner-1 stub'); time.sleep(10**9)"]
    restart: "no"

  dozzle:
    image: amir20/dozzle:latest
    container_name: kubetee-dozzle
    ports:
      - "8080:8080"
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  chain-data:  # if needed for persistence, but localnet usually ephemeral for tests
