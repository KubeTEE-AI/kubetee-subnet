# KubeTEE Subnet Local Testing Stack
# - Local Subtensor chain (fast blocks for dev)
# - Self-contained Rancher (rancher/rancher) + a disposable rancher/k3s
#   downstream "miner-cluster", auto-provisioned by the `rancher-init` service
#   (mints the validator's Rancher API token, imports + labels the downstream).
#   No external Rancher and no Rancher credentials in .env - one `up` is a
#   complete, repeatable environment (chain + Rancher + miner cluster + validator).
# - Single "validator" container that does EVERYTHING (as requested):
#     * btcli setup (register subnet if needed + owner/alice/bob triad + stake
#       + start emissions + set conviction/recycle hypers)
#     * background while loop for keeping conviction hypers
#     * background btcli loop printing stats (hypers, stake, metagraph, conviction, etc.)
#     * foreground validator (g004): alice signs set_weights; miners
#       discovered from the metagraph are scored via the read-only Rancher v3
#       API; weights split KUBETEE_MINER_SHARE to miners, rest to the owner
#       recycle UID. RANCHER_* comes from the gitignored .env (see
#       .env.example); missing/invalid static config refuses to start (D14).
# - Dozzle for live log viewing
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f validator
#   open http://localhost:8080 for dozzle
#
# Everything is inside the single validator container command.
# See keys/README.md for the deterministic (pinned) dev accounts.
#
# For testing pyramid:
#   - Use --profile with-miners for additional mock miners
#   - Localnet provides single-node testnet equivalent
#
# Localnet image choice:
#   Default uses the working opentensor localnet image (RaoFoundation localnet dev images
#   currently return 403/not found on GHCR for the devnet tag).
#   You can override with env var to test Rao path if/when it becomes available:
#     LOCALNET_IMAGE=ghcr.io/raofoundation/subtensor-localnet:devnet docker compose up -d chain
#   Or pin a digest:
#     LOCALNET_IMAGE=ghcr.io/opentensor/subtensor-localnet@sha256:...
#   See SUBNET.md for details.

services:
  chain:
    image: ${LOCALNET_IMAGE:-ghcr.io/opentensor/subtensor-localnet:latest}
    container_name: kubetee-chain
    ports:
      - "9944:9944"
    environment:
      - FAST_BLOCKS=true  # 0.25s blocks for fast testing; set false for realistic tempo
    # Localnet health is best checked by the setup script or btcli.
    # We use a simple depends + sleep in validator if needed.
    restart: unless-stopped

  # Self-contained Rancher management server (embeds a single-node k3s = the
  # `local` management cluster). Disposable dev instance: the bootstrap password
  # is a hardcoded throwaway credential (it controls nothing real, like the
  # pinned dev bittensor seeds). Boots in ~2-3 min; needs --privileged.
  rancher:
    image: rancher/rancher:v2.14.2
    container_name: kubetee-rancher
    privileged: true
    environment:
      - CATTLE_BOOTSTRAP_PASSWORD=kubetee-dev-admin
      - CATTLE_SERVER_URL=https://rancher
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -f https://localhost/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 48
      start_period: 60s
    volumes:
      # Persist the embedded k3s + Rancher control plane so only the FIRST
      # `up` pays the ~3 min bootstrap; later `up`s (after `down` WITHOUT -v)
      # restore state and come up in ~30-60s. `down -v` = clean reset.
      - rancher-data:/var/lib/rancher
    networks:
      default:
        # Static IP so the agent's hostAlias (below) stays valid across
        # restarts even when the container is recreated.
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  # Disposable downstream cluster that gets imported into Rancher and plays the
  # role of a miner's RKE2 cluster (labelled kubetee.ai/miner-hotkey by
  # rancher-init). rancher/k3s as a plain service; ephemeral.
  miner-cluster:
    image: rancher/k3s:v1.35.5-k3s1
    container_name: kubetee-miner-cluster
    privileged: true
    tmpfs:
      - /run
      - /var/run
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    command: server --disable traefik --disable servicelb --tls-san miner-cluster
    volumes:
      - k3s-out:/output
    # Ephemeral on purpose: the downstream is re-imported fresh each `up`
    # (rancher-init deletes any stale cluster first). Persisting it would leave
    # a stale node/agent that cannot cleanly re-handshake after a reboot.
    healthcheck:
      test: ["CMD", "kubectl", "get", "--raw=/readyz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  # One-shot provisioner: logs in to Rancher, mints the validator's API token,
  # imports the miner-cluster, waits for it active and labels it with bob's
  # hotkey. Publishes token + CA to the shared volume for the validator.
  rancher-init:
    image: alpine:3.20
    container_name: kubetee-rancher-init
    depends_on:
      rancher:
        condition: service_healthy
      miner-cluster:
        condition: service_healthy
    environment:
      - RANCHER_URL=https://rancher
      - BOOTSTRAP_PASSWORD=kubetee-dev-admin
      # bob's pinned dev hotkey ss58 (the miner the downstream is labelled
      # for) - derived from DEV_BOB_SEED in scripts/setup_single_node.py.
      - MINER_HOTKEY=5FsfgiqMdQzgqtJQLb15ox6MzcZLvFG55vtAsy4TYuDCEEFs
    volumes:
      - ./scripts:/scripts:ro
      - rancher-shared:/shared
      - k3s-out:/k3s-out:ro
    command: ["sh", "/scripts/rancher_provision.sh"]
    restart: "no"

  validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubetee-validator
    depends_on:
      chain:
        condition: service_started
      rancher-init:
        condition: service_completed_successfully
    environment:
      # Validator signing identity (D7): alice signs set_weights. The
      # subnet-owner wallet (setup/sudo + recycle target) stays "owner".
      - BT_NETWORK=ws://chain:9944
      - BT_WALLET=alice
      - BT_WALLET_HOTKEY=default
      - KUBETEE_OWNER_WALLET=owner
      - KUBETEE_SUBNET_NETUID=1
      # Pinned dev hotkey SS58s (public localnet dev keys, see keys/README.md):
      # owner = recycle target, validator = alice. UIDs are resolved from the
      # metagraph by hotkey - no fixed-UID environment variable.
      - KUBETEE_OWNER_HOTKEY=5FLbZav21bAsjH5SAdmJZwTP5C4b3bcaaWqC6GSmGmsbzUJ9
      - KUBETEE_VALIDATOR_HOTKEY=5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY
      # Rancher scoring endpoint: the in-compose `rancher` service. The bearer
      # token is minted per-`up` by `rancher-init` and read from /shared at
      # startup (see command below); the self-signed CA is trusted via
      # SSL_CERT_FILE. Nothing Rancher-related lives in .env anymore.
      - RANCHER_URL=https://rancher
      - SSL_CERT_FILE=/shared/rancher-ca.crt
      # Tunables (plan-pinned defaults; override via .env)
      - KUBETEE_MINER_SHARE=${KUBETEE_MINER_SHARE:-0.10}
      - KUBETEE_POLL_SECONDS=${KUBETEE_POLL_SECONDS:-60}
      - KUBETEE_MAX_CONSECUTIVE_SKIPS=${KUBETEE_MAX_CONSECUTIVE_SKIPS:-10}
      - KUBETEE_RECONCILE_MIN_CYCLES=${KUBETEE_RECONCILE_MIN_CYCLES:-3}
      - KUBETEE_RECONCILE_MIN_SECONDS=${KUBETEE_RECONCILE_MIN_SECONDS:-900}
      # Prometheus metrics: compose-internal only (no host port mapping, AC11)
      - KUBETEE_METRICS_PORT=9100
      - LOG_LEVEL=INFO
    volumes:
      # Isolated dev wallets: the owner/alice/bob triad is regenerated from
      # pinned seeds by setup_single_node.py on every `up`, so there is no need
      # to bind-mount (and pollute / root-own) the host ~/.bittensor. Keys live
      # in this named volume; `down -v` wipes them, next `up` recreates them.
      # Host btcli: use `docker compose exec validator btcli ...`.
      - bittensor-wallets:/root/.bittensor
      - ./logs:/app/logs
      - ./scripts:/app/scripts         # live dev scripts
      - rancher-shared:/shared         # Rancher token + CA published by rancher-init
    restart: unless-stopped
    # Everything in ONE container command as requested:
    # 1. Run btcli setup (register if needed, owner/alice/bob triad, stake, start emissions, set conviction/recycle hypers)
    # 2. Background while-loop to keep setting conviction hypers
    # 3. Background btcli stats printer (hypers, stake, metagraph, conviction, etc.)
    # 4. Foreground: validator.py (alice signs; Rancher-scored miner share, owner recycle split)
    # All logs go to this container (view with `docker compose logs -f validator`)
    command:
      - sh
      - -c
      - |
        set -e
        NETUID=$${KUBETEE_SUBNET_NETUID:-1}
        OWNER_WALLET=$${KUBETEE_OWNER_WALLET:-owner}
        HOTKEY=$${BT_WALLET_HOTKEY:-default}
        NET=$${BT_NETWORK:-ws://chain:9944}

        # The in-compose Rancher is provisioned by rancher-init, which publishes
        # the freshly-minted validator token + CA into the shared volume. Wait
        # for it, then wire the token (RANCHER_URL + CA come from environment).
        echo "=== [validator] waiting for in-compose Rancher provisioning ==="
        until [ -f /shared/ready ]; do sleep 2; done
        export RANCHER_BEARER_TOKEN="$$(cat /shared/rancher-token)"
        echo "=== [validator] Rancher wired: $$RANCHER_URL ==="

        echo "=== [validator] Phase 1: btcli setup (register, stake, start, hypers) ==="
        python scripts/setup_single_node.py \
          --netuid "$$NETUID" \
          --owner-wallet "$$OWNER_WALLET" \
          --chain-endpoint "$$NET" || true

        # Read actual netuid written by setup (in case create allocated e.g. 2)
        if [ -f /app/.kubetee_netuid ]; then
          NETUID=$$(cat /app/.kubetee_netuid)
          echo "Using actual netuid=$$NETUID from setup"
        fi

        echo "=== [validator] Phase 2: starting background loops + basic validator ==="

        # Conviction setter loop (was separate container) - quiet to not pollute stats.
        # setup_single_node.py writes /app/.kubetee_owned=false when it verified (via a
        # real chain query, not a guess) that our wallet does NOT own $$NETUID - e.g. the
        # SubtokenDisabled / pre-owned-bootstrap-netuid case. Retrying a sudo call we
        # already know fails with "wallet doesn't own the specified subnet" every 45s
        # forever was the direct cause of the chain node's HTTP 429 connection throttling.
        # Back off hard (5 min) instead of hammering the chain when we know it's futile,
        # but keep checking in case ownership later changes out-of-band.
        (
          while true; do
            OWNED="unknown"
            [ -f /app/.kubetee_owned ] && OWNED=$$(cat /app/.kubetee_owned)
            if [ "$$OWNED" = "false" ]; then
              echo "[conviction @ $$(date)] skipping - setup verified we do not own netuid $$NETUID (see setup log). Re-checking in 300s."
              sleep 300
              continue
            fi
            echo "[conviction @ $$(date)] setting owner_cut_auto_lock_enabled + recycle..."
            btcli sudo set \
              --netuid "$$NETUID" \
              --param owner_cut_auto_lock_enabled \
              --value true \
              --wallet.name "$$OWNER_WALLET" \
              --wallet-hotkey "$$HOTKEY" \
              --network "$$NET" \
              --yes > /dev/null 2>&1 || echo "  (set failed - not owner)"
            btcli sudo set \
              --netuid "$$NETUID" \
              --param recycle_or_burn \
              --value Recycle \
              --wallet.name "$$OWNER_WALLET" \
              --wallet-hotkey "$$HOTKEY" \
              --network "$$NET" \
              --yes > /dev/null 2>&1 || echo "  (set failed - not owner)"
            sleep 45
          done
        ) &

        # Stats printer - loops internally (--loop/--interval) reusing ONE chain
        # connection for the container's lifetime, instead of the old shell
        # while-loop that spawned a fresh python process (and fresh websocket
        # connection) every 25s - that reconnect churn contributed to HTTP 429s.
        python -u scripts/print_subnet_stats.py \
          --netuid "$$NETUID" \
          --network "$$NET" \
          --owner-wallet "$$OWNER_WALLET" \
          --miner-wallet bob \
          --loop --interval 25 2>&1 | cat &

        # Foreground: the validator (alice signs set_weights; fails
        # fast at startup on missing/invalid static config incl. RANCHER_*).
        echo "Starting validator.py (scoring + weights loop)..."
        exec python -u scripts/validator.py

  # Optional: simple mock miner containers for testing comms/scoring (extend as needed)
  miner-1:
    build:
      context: .
      dockerfile: Dockerfile  # reuse or make miner image; for now stub
    container_name: kubetee-miner-1
    profiles: ["with-miners"]
    environment:
      - BT_NETWORK=ws://chain:9944
      - ROLE=miner
    depends_on:
      - chain
    # Explicit command so the validator entrypoint (btcli setup + validator) is not run for the miner stub
    command: ["python", "-c", "import time; print('miner-1 stub'); time.sleep(10**9)"]
    restart: "no"

  dozzle:
    image: amir20/dozzle:latest
    container_name: kubetee-dozzle
    ports:
      - "8080:8080"
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  chain-data:      # if needed for persistence, but localnet usually ephemeral for tests
  k3s-out:         # miner-cluster kubeconfig (read by rancher-init)
  rancher-data:    # Rancher + embedded k3s control plane (persist for fast reboots)
  rancher-shared:  # minted Rancher token + CA (rancher-init -> validator)
  bittensor-wallets:  # dev triad wallets, regenerated from pinned seeds - isolated from host

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
