# Use this document to specify the minimum compute requirements.
# This document will be used to generate a list of recommended hardware for your subnet.

# This is intended to give a rough estimate of the minimum requirements
# so that the user can make an informed decision about whether or not
# they want to run a miner or validator on their machine.

# NOTE: Miners require TEE (Trusted Execution Environment) attestation - Intel TDX/SGX or NVIDIA CC
# NOTE: Miners must provide full 8-GPU nodes (H100/H200/B200/B300)

version: '1.0' # update this version key as needed, ideally should match your release version

compute_spec:

  miner:

    cpu:
      min_cores: 64            # Minimum number of CPU cores (for 8-GPU node)
      min_speed: 2.5           # Minimum speed per core (GHz)
      recommended_cores: 128   # Recommended number of CPU cores
      recommended_speed: 3.0   # Recommended speed per core (GHz)
      architecture: "x86_64"   # Architecture type (e.g., x86_64, arm64)
      tee_required: True       # TEE attestation mandatory (Intel TDX/SGX)

    gpu:
      required: True                        # Does the application require a GPU?
      min_count: 8                          # Minimum number of GPUs per node
      min_vram: 80                          # Minimum GPU VRAM per GPU (GB) - H100 = 80GB
      recommended_vram: 141                 # Recommended GPU VRAM per GPU (GB) - H200 = 141GB
      min_compute_capability: 9.0           # Minimum CUDA compute capability (Hopper)
      recommended_compute_capability: 10.0  # Recommended CUDA compute capability (Blackwell)
      min_gpu: "NVIDIA H100"                # Minimum GPU tier
      recommended_gpu: "NVIDIA H200"        # Recommended GPU tier
      top_tier_gpu: "NVIDIA B200/B300"      # Top tier for maximum emissions
      tee_required: True                    # NVIDIA Confidential Computing required

    memory:
      min_ram: 1512          # Minimum RAM (GB) - for 8-GPU node
      recommended_ram: 2560 # Recommended RAM (GB)
      ram_type: "DDR5"      # RAM type

    storage:
      min_space: 10000          # Minimum free storage space (GB)
      recommended_space: 30000  # Recommended free storage space (GB)
      type: "NVMe"         # Preferred storage type
      min_iops: 100000         # Minimum I/O operations per second
      recommended_iops: 500000 # Recommended I/O operations per second

    os:
      name: "Ubuntu"  # Name of the preferred operating system(s)
      version: 25.04  # Version of the preferred operating system(s)
      kernel_version: 6.14.0-1008-intel

  validator:

    cpu:
      min_cores: 8             # Minimum number of CPU cores
      min_speed: 2.5           # Minimum speed per core (GHz)
      recommended_cores: 16    # Recommended number of CPU cores
      recommended_speed: 3.0   # Recommended speed per core (GHz)
      architecture: "x86_64"   # Architecture type (e.g., x86_64, arm64)

    gpu:
      required: False                       # Validators do not require GPU
      min_vram: 0                           # No GPU VRAM required
      recommended_vram: 0                   # No GPU VRAM required

    memory:
      min_ram: 32           # Minimum RAM (GB)
      min_swap: 8           # Minimum swap space (GB)
      recommended_ram: 64   # Recommended RAM (GB)
      recommended_swap: 16  # Recommended swap space (GB)
      ram_type: "DDR4"      # RAM type

    storage:
      min_space: 100           # Minimum free storage space (GB)
      recommended_space: 500   # Recommended free storage space (GB)
      type: "SSD"              # Preferred storage type
      min_iops: 10000          # Minimum I/O operations per second
      recommended_iops: 50000  # Recommended I/O operations per second

    os:
      name: "Ubuntu"  # Name of the preferred operating system(s)
      version: 22.04  # Version of the preferred operating system(s)

network_spec:
  bandwidth:
    min_speed: 10000       # Minimum network speed (Mbps) - 10Gbps baseline
    recommended_speed: 25000  # Recommended network speed (Mbps) - 25Gbps
    download: 10000        # Minimum download bandwidth (Mbps)
    upload: 10000          # Minimum upload bandwidth (Mbps) - symmetric required
